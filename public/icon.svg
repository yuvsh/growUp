<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="growUp">
  <!-- growUp app icon — a rising growth curve ending in a green sprout.
       Maskable-safe: full-bleed background, mark within the centre safe zone.
       Palette: background #ECFEFF, curve #0891B2 (cyan), sprout #059669 (green). -->
  <rect width="64" height="64" rx="14" fill="#ECFEFF"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Growth curve (echoes a WHO percentile line) -->
    <path d="M12 50 C 20 49, 27 46, 31 40 C 34 36, 35 33, 36 30"
          stroke="#0891B2" stroke-width="5"/>
    <!-- Sprout stem -->
    <path d="M36 31 L 36 19" stroke="#059669" stroke-width="4.5"/>
  </g>
  <!-- Two leaves -->
  <ellipse cx="29" cy="17" rx="9" ry="4.6" fill="#059669" transform="rotate(-35 29 17)"/>
  <ellipse cx="44" cy="16" rx="9" ry="4.6" fill="#059669" transform="rotate(35 44 16)"/>
</svg>
