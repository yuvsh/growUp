<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 140" role="img" aria-label="A tiny seedling waiting to grow">
  <!-- growUp empty state — "no baby yet". A seedling just emerging, with a
       soft dashed ring inviting the first step. Brand palette baked in. -->
  <circle cx="80" cy="70" r="58" fill="#ECFEFF"/>
  <circle cx="80" cy="70" r="58" fill="none" stroke="#A5F3DC" stroke-width="2.5" stroke-dasharray="4 10" stroke-linecap="round"/>
  <!-- Soil mound -->
  <path d="M40 96 Q 80 82 120 96 L 120 104 Q 80 116 40 104 Z" fill="#D1FAE5"/>
  <!-- Seedling -->
  <path d="M80 100 L 80 70" fill="none" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="68" cy="64" rx="13" ry="6.5" fill="#059669" transform="rotate(-35 68 64)"/>
  <ellipse cx="92" cy="60" rx="13" ry="6.5" fill="#34D399" transform="rotate(35 92 60)"/>
</svg>
